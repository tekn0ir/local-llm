name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    # depending on default permission settings for your org (contents being read-only or read-write for workloads), you will have to add permissions
    # see: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Check chart release version
        id: check_chart_version
        run: |
          CHART_VERSION=$(grep '^version:' charts/local-llm/Chart.yaml | awk '{print $2}')
          if [[ ! "$CHART_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Chart version $CHART_VERSION is not a stable X.Y.Z release version (pre-release suffixes belong on the beta branch)"
          exit 1
          fi
          echo "Chart version $CHART_VERSION is valid for a stable release"
          echo "version=$CHART_VERSION" >> "$GITHUB_OUTPUT"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@a917fd15b20e8b64b94d9158ad54cd6345335584 # v1.6.0
        with:
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Pin rtx2000-ada-128gb-se device manifest to the released version
        run: |
          MANIFEST=gitops/rtx2000-ada-128gb-se.yaml
          CHART_VERSION="${{ steps.check_chart_version.outputs.version }}"
          if grep -q '^  version:' "$MANIFEST"; then
            sed -i "s/^  version:.*/  version: $CHART_VERSION/" "$MANIFEST"
          else
            sed -i "/^  chart: local-llm/a\\  version: $CHART_VERSION" "$MANIFEST"
          fi
          if ! git diff --quiet -- "$MANIFEST"; then
            git add "$MANIFEST"
            git commit -m "Pin local-llm to $CHART_VERSION on rtx2000-ada-128gb-se"
            git push
          fi
