# Image configuration
image:
  repository: vllm/vllm-openai
  # TODO: pin to a digest once a known-good build is verified for this hardware.
  # Must be >= v0.15.0 -- earlier releases don't load the Qwen3-Next hybrid
  # DeltaNet+MoE architecture.
  tag: v0.25.1
  # The tag is mutable; pull it every time until it's pinned to a digest
  # above, otherwise a stale cached image would never be refreshed.
  pullPolicy: Always

# GPU node placement (empty selects any node; single-node cluster)
nodeSelector: {}

# Model configuration.
# Qwen3.6-27B (AWQ 4-bit, ~21GiB), served via vLLM. It fits entirely in the 2x RTX 2000 Ada
# GPUs (32GB combined VRAM) with no CPU offload, at 64K context, with MTP (Multi-Token
# Prediction) speculative decoding enabled for faster decode. CUDA graphs are disabled
# (--enforce-eager) to avoid a startup OOM on these 16GB GPUs.
# See HARDWARE.md for why this model was chosen.
model:
  huggingfaceRepo: QuantTrio/Qwen3.6-27B-AWQ
  servedName: qwen3.6-27b
  # 65536 = 64K, a quarter of the model's 256K native max. KV cache is cheap here
  # (Qwen3.6-27B uses gated-delta hybrid attention -- constant-size state on most
  # layers), but a shorter context shrinks activation/scratch buffers and leaves
  # room for KV-cache profiling, which together with --enforce-eager clears the
  # startup OOM on these 16GB GPUs. Raise back toward 131072 on hardware that fits.
  maxModelLen: 65536
  toolCallParser: qwen3_coder
  reasoningParser: qwen3
  # Server-side sampling defaults applied when a client doesn't set them
  # explicitly, via --override-generation-config. Keys are vLLM/HF generation
  # config field names (snake_case), not chart convention -- they're
  # serialized to JSON verbatim.
  samplingDefaults:
    temperature: 0.6
    top_p: 0.95
    top_k: 20

# Tensor placement across the two 16GB GPUs with no CPU offload.
vllm:
  # Split the model across both GPUs (no NVLink between them).
  tensorParallelSize: 2
  # No explicit --quantization: let vLLM auto-detect it instead -- this
  # matches the checkpoint's own documented launch command. FP8 W8A8 is also
  # supported on Ada (cc 8.9) but its ~92GB footprint is far too large here.
  gpuMemoryUtilization: 0.90
  # Disable CUDA-graph capture (--enforce-eager). Graph capture reserves an extra
  # activation buffer at startup that OOMs here; eager mode skips it for a small
  # decode-speed cost. Set false to re-enable graphs once VRAM headroom allows.
  enforceEager: true
  # KV-cache quantization (optional; leave empty for default/auto).
  kvCacheDtype: fp8
  # MTP (Multi-Token Prediction) speculative decoding configuration.
  speculative:
    method: qwen3_next_mtp
    num_speculative_tokens: 1

# Persist the downloaded AWQ weights so the ~21GB download only happens once.
persistence:
  hostPath: /opt/teknoir/local-llm/models

resources:
  requests:
    cpu: "8"
    memory: 72Gi
  limits:
    cpu: "12"
    memory: 100Gi
  # No nvidia.com/gpu request/limit: this k3s device's nvidia runtime doesn't
  # register GPU as a schedulable device-plugin resource (confirmed on-device),
  # so setting it would leave the pod stuck Pending. GPU access is granted purely
  # via runtimeClassName: nvidia, matching the sibling openclaw-helm chart.

# Open WebUI: a chat UI for testing/evaluating the model, talking to vLLM's
# OpenAI-compatible API (see service.yaml). No GPU needed. Exposed via
# NodePort per this platform's convention (ClusterIP stays reserved for the
# model API itself).
openWebui:
  image:
    repository: ghcr.io/open-webui/open-webui
    # TODO: pin to a digest once a known-good version is verified for this hardware.
    tag: main
    pullPolicy: Always
  # Fixed NodePort for the web UI, derived from its default UI port 8080.
  nodePort: 30080
  # Chat history, uploads, and the local vector DB.
  persistence:
    hostPath: /opt/teknoir/local-llm/open-webui
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
