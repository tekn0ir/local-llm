# Image configuration
image:
  repository: vllm/vllm-openai
  # TODO: pin to a digest once a known-good build is verified for this hardware.
  # Must be >= v0.15.0 -- earlier releases don't load the Qwen3-Next hybrid
  # DeltaNet+MoE architecture. Bumped to the latest release to test whether it
  # fixes a known upstream bug (vllm-project/vllm#21864, #37883): CPU-offloaded
  # (UVA) MoE weights appear as device='cuda' but are physically on CPU, and
  # the Marlin repack in process_weights_after_loading allocates a full-size
  # GPU buffer for the packed output without accounting for that, OOMing on
  # v0.15.0 regardless of how much is offloaded. If this still OOMs the same
  # way, the bug isn't fixed here either -- see HARDWARE.md for the fallback.
  tag: v0.25.1
  # The tag is mutable; pull it every time until it's pinned to a digest
  # above, otherwise a stale cached image would never be refreshed.
  pullPolicy: Always

# GPU node placement (empty selects any node; single-node cluster)
nodeSelector: {}

# Model configuration.
# Qwen3-Coder-Next (80B total / 3B active MoE), a coding/agentic specialist,
# served via vLLM instead of llama.cpp for its native Qwen3-Next hybrid
# DeltaNet+MoE support, multi-token prediction, and qwen3_coder tool-call
# parser. See HARDWARE.md for why this model/runtime was chosen over the
# frontier open coders (GLM-5.2, DeepSeek V4, Qwen3-Coder-480B) and over the
# 30B-that-fits-in-VRAM alternative on this device.
model:
  huggingfaceRepo: bullpoint/Qwen3-Coder-Next-AWQ-4bit
  servedName: qwen3-coder-next
  # 262144 = the model's full native context. KV cache is cheap here despite
  # the size: only 12 of 48 layers do full attention (2 KV heads, 256 head
  # dim); the rest are Gated DeltaNet with constant-size state that doesn't
  # grow with context length. That works out to ~12KB/token/GPU at TP=2, so
  # the full 256K context costs only ~3GB/GPU -- cpuOffloadGb below is sized
  # to leave that much headroom above the weights. Verify against free VRAM
  # on device; lower here first if it OOMs.
  maxModelLen: 262144
  toolCallParser: qwen3_coder

# Tensor placement across the two 16GB GPUs + 125GiB host RAM.
vllm:
  # Split the model across both GPUs (no NVLink between them).
  tensorParallelSize: 2
  # The 80B AWQ INT4 checkpoint doesn't fit in 32GB combined VRAM; spill this
  # many GB *per GPU* to system RAM via vLLM's CPU offload path. Dense,
  # PCIe-bound, slower than llama.cpp's expert-specific offload, but keeps the
  # 80B's coding quality. Measured on device at v0.15.0: 12GB/GPU and 20GB/GPU
  # both left ~15.3-15.4GB of weights resident per card and OOMed identically
  # in the Marlin MoE repack -- raising the offload budget had no effect,
  # which is the fingerprint of the upstream CPU-offload/MoE-repack bug noted
  # above, not an undersized budget. Pushed to 32GB/GPU (above the ~24-27GB/GPU
  # weight shard itself) so that *if* the newer vLLM's repack path correctly
  # respects offloaded tensors, as little as possible stays resident; if the
  # bug is still present this will fail the same way regardless of the value.
  # ~64GB total offloaded to RAM (well within 125GB). Lower for more speed
  # once it starts cleanly.
  cpuOffloadGb: 32
  # No explicit --quantization: the bullpoint checkpoint is packaged as
  # compressed-tensors (an llm-compressor AWQ recipe), not vLLM's native AWQ
  # format, and vLLM errors out if the flag doesn't match what's baked into
  # the checkpoint's own config. Let vLLM auto-detect it instead -- this
  # matches the checkpoint's own documented launch command. FP8 W8A8 is also
  # supported on Ada (cc 8.9) but its ~92GB footprint is far too large here.
  gpuMemoryUtilization: 0.90

# Persist the downloaded AWQ weights so the ~40GB download only happens once.
persistence:
  hostPath: /opt/teknoir/local-llm/models

resources:
  requests:
    cpu: "8"
    memory: 72Gi
  limits:
    cpu: "12"
    memory: 100Gi
  # No nvidia.com/gpu request/limit: this k3s device's nvidia runtime doesn't
  # register GPU as a schedulable device-plugin resource (confirmed on-device),
  # so setting it would leave the pod stuck Pending. GPU access is granted purely
  # via runtimeClassName: nvidia, matching the sibling openclaw-helm chart.

# Open WebUI: a chat UI for testing/evaluating the model, talking to vLLM's
# OpenAI-compatible API (see service.yaml). No GPU needed. Exposed via
# NodePort per this platform's convention (ClusterIP stays reserved for the
# model API itself).
openWebui:
  image:
    repository: ghcr.io/open-webui/open-webui
    # TODO: pin to a digest once a known-good version is verified for this hardware.
    tag: main
    pullPolicy: Always
  # Fixed NodePort for the web UI, derived from its default UI port 8080.
  nodePort: 30080
  # Chat history, uploads, and the local vector DB.
  persistence:
    hostPath: /opt/teknoir/local-llm/open-webui
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
