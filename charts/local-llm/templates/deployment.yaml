apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-llm
  labels:
    app: local-llm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: local-llm
  template:
    metadata:
      labels:
        app: local-llm
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: vllm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Qwen3-Coder-Next (80B total / 3B active MoE), AWQ INT4, served with
          # vLLM's native Qwen3-Next hybrid DeltaNet+MoE support. The image's
          # ENTRYPOINT is already `vllm serve`, so args start with the model:
          #   * vLLM auto-downloads and caches the AWQ checkpoint from Hugging Face.
          #   * --tensor-parallel-size splits the model across both 16GB GPUs.
          #   * --cpu-offload-gb spills the remainder that doesn't fit in 32GB
          #     combined VRAM to system RAM (dense, PCIe-bound offload).
          #   * --tool-call-parser qwen3_coder enables agentic tool calling.
          args:
            - "{{ .Values.model.huggingfaceRepo }}"
            - --tensor-parallel-size
            - "{{ .Values.vllm.tensorParallelSize }}"
            # These GPUs have no NVLink and PCIe P2P isn't usable on this board,
            # so vLLM's custom all-reduce (which needs P2P) can't work; disable
            # it and fall back to NCCL. See NCCL_* env below.
            - --disable-custom-all-reduce
            - --cpu-offload-gb
            - "{{ .Values.vllm.cpuOffloadGb }}"
            - --max-model-len
            - "{{ .Values.model.maxModelLen }}"
            - --gpu-memory-utilization
            - "{{ .Values.vllm.gpuMemoryUtilization }}"
            - --enable-auto-tool-choice
            - --tool-call-parser
            - "{{ .Values.model.toolCallParser }}"
            - --served-model-name
            - "{{ .Values.model.servedName }}"
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Persist the Hugging Face download cache so the ~40GB AWQ checkpoint
            # is fetched only once.
            - name: HF_HOME
              value: /models
            # The two GPUs have no NVLink and PCIe P2P isn't usable on this
            # board. Without these, NCCL hangs at distributed init -- both GPUs
            # spin at 100% util with no memory allocated and the pod never
            # becomes ready (it never even reaches weight download). Forcing
            # NCCL off P2P and off the absent InfiniBand transport lets it fall
            # back to shared-memory/host staging, which works.
            - name: NCCL_P2P_DISABLE
              value: "1"
            - name: NCCL_IB_DISABLE
              value: "1"
            # Temporary: log NCCL's transport/topology decisions so a future
            # init hang is diagnosable from `kubectl logs`. Safe to drop once
            # multi-GPU startup is confirmed stable on device.
            - name: NCCL_DEBUG
              value: "INFO"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # startupProbe absorbs the slow first start (~40GB download + load across
          # CPU+GPU); readinessProbe/livenessProbe only take over once it succeeds,
          # so a post-startup hang is still caught and restarted instead of the pod
          # being marked ready-forever with no liveness check.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 480
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: models
          hostPath:
            path: {{ .Values.persistence.hostPath }}
            type: DirectoryOrCreate
        # NCCL (used by --tensor-parallel-size across both GPUs) needs a
        # memory-backed /dev/shm larger than the container default.
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
