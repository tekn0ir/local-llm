apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  labels:
    app: open-webui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: open-webui
          image: "{{ .Values.openWebui.image.repository }}:{{ .Values.openWebui.image.tag }}"
          imagePullPolicy: {{ .Values.openWebui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Talk to vLLM's OpenAI-compatible API instead of Open WebUI's
            # default Ollama backend, which nothing in this chart runs.
            - name: ENABLE_OLLAMA_API
              value: "false"
            - name: OPENAI_API_BASE_URLS
              value: "http://local-llm.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
            - name: OPENAI_API_KEYS
              value: "local-llm-unused"
          resources:
            {{- toYaml .Values.openWebui.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: open-webui-data
              mountPath: /app/backend/data
      volumes:
        - name: open-webui-data
          hostPath:
            path: {{ .Values.openWebui.persistence.hostPath }}
            type: DirectoryOrCreate
